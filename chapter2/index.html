<style>
  :root { --gold: #c9a84c; --ash: #0d0c0a; --text: #d4c9a8; --text-dim: #7a7060; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--ash); color: var(--text); font-family: 'Cormorant Garamond', serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .box { max-width: 480px; }
  .eyebrow { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.5em; color: var(--gold); text-transform: uppercase; margin-bottom: 1.5rem; }
  h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; line-height: 1.05; color: var(--text); margin-bottom: 1rem; }
  h1 em { display: block; font-style: italic; font-weight: 400; color: var(--gold); font-size: 0.45em; letter-spacing: 0.1em; margin-top: 0.3em; }
  p { font-style: italic; color: var(--text-dim); line-height: 1.8; font-size: 1rem; margin-top: 1.5rem; }
  a { color: var(--gold); text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; display: inline-block; margin-top: 2rem; border: 1px solid rgba(201,168,76,0.3); padding: 0.8rem 2rem; transition: border-color 0.3s; }
  a:hover { border-color: var(--gold); }
</style>
</head>
